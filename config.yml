          title: "Manuel Schick"
          subtitle: "I am a PhD Candidate at Heidelberg University and a Postdoctoral Researcher at the Vrije Universiteit Amsterdam. My research interests comprise macroeconomic forecasting, density and tail risk modeling, survey expectations, econometrics, and empirical finance. I hold a Master's degree in Economics and Finance from the University of Tübingen. During my studies, I gained work experience in economic research as a student assistant at the Institute for Applied Economic Research (IAW) in Tübingen."
